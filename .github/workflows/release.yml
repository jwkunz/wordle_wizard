name: Release Single File App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main --depth=1
          git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.115

      - name: Build single-file distribution
        run: ./scripts/package_single_html.sh

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wordle_wizard_single_file.html
          generate_release_notes: true
